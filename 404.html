<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>페이지를 찾을 수 없습니다 — 서울이도치과의원</title>
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon-180.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" />
  <style>
    :root { --bg:#232220; --fg:#fffcf3; --dim:#cbc4b8; --accent:#e95e27; --accent-cta:#c2491a; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font-family: "Pretendard Variable", -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px;
    }
    .wrap { max-width: 34rem; }
    .mark { margin-bottom: 2.75rem; }
    .mark img { height: 56px; width: auto; }
    .code { font-family: "Gowun Dodum", sans-serif; font-size: clamp(3.5rem, 14vw, 6rem); line-height: 1; color: var(--accent); margin: 0 0 .4rem; }
    h1 { font-family: "Gowun Dodum", sans-serif; font-weight: 400; font-size: clamp(1.6rem, 5vw, 2.2rem); margin: 0 0 .7rem; line-height: 1.2; }
    p { color: var(--dim); font-size: 1.0625rem; line-height: 1.65; margin: 0 0 2.2rem; word-break: keep-all; }
    a.home { display: inline-block; background: var(--accent-cta); color: #fff; text-decoration: none;
      padding: .85rem 1.7rem; border-radius: 999px; font-size: .95rem; font-weight: 600; transition: background .2s ease; }
    a.home:hover { background: #a23c12; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark"><img src="/assets/logo/logo-light.png" alt="서울이도치과의원 Seoul Yido Dental Office" /></div>
    <p class="code">404</p>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 없거나 주소가 변경되었습니다.<br />홈에서 다시 찾아보실 수 있습니다.</p>
    <a class="home" href="/">홈으로 돌아가기</a>
  </div>
</body>
</html>
