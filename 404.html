<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>페이지를 찾을 수 없습니다 — 서울이도치과 (YIDO)</title>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#111113; --fg:#EDEAE3; --dim:#9a958c; --accent:#C9803F; --accent-cta:#A85A2E; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; background: var(--bg); color: var(--fg);
      font-family: "Inter", -apple-system, system-ui, "Pretendard Variable", sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center; text-align: center; padding: 24px;
    }
    .wrap { max-width: 34rem; }
    .mark { font-family: "Cormorant Garamond", Georgia, serif; font-size: 1.9rem; letter-spacing: .04em; margin-bottom: 2.75rem; }
    .mark .dot { color: var(--accent); }
    .mark .kr { font-family: "Inter", sans-serif; font-size: .8rem; color: var(--dim); letter-spacing: .04em; margin-left: .5rem; }
    .code { font-family: "Cormorant Garamond", Georgia, serif; font-size: clamp(3.5rem, 14vw, 6rem); line-height: 1; color: var(--accent); margin: 0 0 .4rem; }
    h1 { font-family: "Cormorant Garamond", Georgia, serif; font-weight: 600; font-size: clamp(1.6rem, 5vw, 2.2rem); margin: 0 0 .7rem; line-height: 1.15; }
    p { color: var(--dim); font-size: 1.0625rem; line-height: 1.65; margin: 0 0 2.2rem; word-break: keep-all; }
    a.home { display: inline-block; background: var(--accent-cta); color: #fff; text-decoration: none;
      padding: .85rem 1.7rem; border-radius: 999px; font-size: .95rem; font-weight: 600; transition: background .2s ease; }
    a.home:hover { background: #95501F; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark">YIDO<span class="dot">.</span><span class="kr">서울이도치과</span></div>
    <p class="code">404</p>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 없거나 주소가 변경되었습니다.<br />홈에서 다시 찾아보실 수 있습니다.</p>
    <a class="home" href="/">홈으로 돌아가기</a>
  </div>
</body>
</html>
